# CI override — redirects all Arena images to GHCR mirror to avoid ECR Public rate limits.
# Usage: docker compose -f docker-compose.yaml -f docker-compose.ci.yaml up -d
services:
  php-fpm:
    image: ghcr.io/helter5/uww-arena:latest
  arena-mq-processor:
    image: ghcr.io/helter5/uww-arena:latest
  arena-periodic-jobs:
    image: ghcr.io/helter5/uww-arena:latest
  nginx:
    image: ghcr.io/helter5/uww-arena-web:latest
  gotenberg:
    image: gotenberg/gotenberg:8
