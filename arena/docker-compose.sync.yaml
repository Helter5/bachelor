services:
  mysql:
    image: public.ecr.aws/uww/app/arena-db:latest
    container_name: arena-sync-mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root123}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-arena}
      MARIADB_USER: ${MARIADB_USER:-arena}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-arena}
    volumes:
      - arena_sync_database:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  php-fpm:
    image: public.ecr.aws/uww/app/arena:latest
    container_name: arena-sync-php-fpm
    entrypoint: ["/bin/sh", "/entrypoint.sh", "php-fpm"]
    restart: unless-stopped
    environment:
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:--1}
      DOCKER_COMPOSE_FILE_VERSION: "1.2"
    volumes:
      - arena_sync_public_uploads:/var/www/arena/current/public/uploads
      - arena_sync_php_shared_temp_dir:/var/www/arena/phpshared
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: public.ecr.aws/uww/app/arena-web:latest
    container_name: arena-sync-nginx
    restart: unless-stopped
    ports:
      - "${ARENA_SYNC_PORT:-8080}:80"
    volumes:
      - arena_sync_public_uploads:/var/www/arena/current/public/uploads
    depends_on:
      php-fpm:
        condition: service_started

volumes:
  arena_sync_database:
  arena_sync_public_uploads:
  arena_sync_php_shared_temp_dir:
