name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_USER=user
          DATABASE_PASSWORD=password
          DATABASE_NAME=arena_db
          DATABASE_HOST=wf-db
          DATABASE_PORT=5432
          JWT_SECRET_KEY=ci-test-secret-key
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM_EMAIL=ci@example.com
          SMTP_FROM_NAME=Wrestling Federation
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          FRONTEND_URL=http://localhost:5173
          ARENA_HOST=arena-host
          ARENA_PORT=8080
          ARENA_CLIENT_ID=${{ secrets.ARENA_CLIENT_ID }}
          ARENA_CLIENT_SECRET=${{ secrets.ARENA_CLIENT_SECRET }}
          ARENA_API_KEY=${{ secrets.ARENA_API_KEY }}
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Arena stack — start in background immediately ──────────────────────
      - name: Start Arena services
        working-directory: arena
        run: docker compose up -d

      # ── Build backend while Arena is warming up ────────────────────────────
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: wrestling-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start DB + API
        run: docker compose up -d wf-db wf-api

      # ── Wait for both stacks in sequence ──────────────────────────────────
      - name: Wait for Arena to be ready
        run: |
          echo "Waiting for Arena nginx..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do
              sleep 5
            done'
          echo "Arena is up"

      - name: Import Arena seed data
        working-directory: arena
        run: |
          zcat database/seed/arena_data.sql.gz | \
            docker compose exec -T mysql mysql --force -u arena -parena arena
          echo "Seed data imported"

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          timeout 90 bash -c \
            'until docker compose ps wf-api | grep -q "(healthy)"; do
              docker compose ps wf-api
              sleep 5
            done'

      # ── Auth & access control tests ────────────────────────────────────────
      - name: Run auth tests
        run: |
          docker compose exec -T wf-api python -m pytest \
            tests/test_api_access_control.py \
            tests/test_auth_profile.py \
            -v --tb=short

      # ── Sync & statistics tests (vyžadujú Arenu) ──────────────────────────
      - name: Run sync + statistics tests
        run: docker compose run --rm wf-tests

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs wf-api
          docker compose -f arena/docker-compose.yaml logs nginx php-fpm

      - name: Stop and clean up services
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          docker compose -f arena/docker-compose.yaml down -v --remove-orphans || true
