name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:

  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build backend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── 2. Auth & access control tests (no Arena needed) ───────────────────────
  test-auth:
    name: Auth & access control tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_USER=user
          DATABASE_PASSWORD=password
          DATABASE_NAME=arena_db
          DATABASE_HOST=wf-db
          DATABASE_PORT=5432
          JWT_SECRET_KEY=ci-test-secret-key
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM_EMAIL=ci@example.com
          SMTP_FROM_NAME=Wrestling Federation
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          FRONTEND_URL=http://localhost:5173
          ARENA_HOST=arena-host
          ARENA_PORT=8080
          ARENA_CLIENT_ID=${{ secrets.ARENA_CLIENT_ID }}
          ARENA_CLIENT_SECRET=${{ secrets.ARENA_CLIENT_SECRET }}
          ARENA_API_KEY=${{ secrets.ARENA_API_KEY }}
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image from cache
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: wrestling-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start DB + API
        run: docker compose up -d wf-db wf-api

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          timeout 90 bash -c \
            'until docker compose ps wf-api | grep -q "(healthy)"; do
              docker compose ps wf-api
              sleep 5
            done'

      - name: Run auth & access control tests
        run: |
          docker compose exec -T wf-api python -m pytest \
            tests/test_api_access_control.py \
            tests/test_auth_profile.py \
            -v --tb=short

      - name: Show logs on failure
        if: failure()
        run: docker compose logs wf-api

      - name: Stop and clean up
        if: always()
        run: docker compose down -v --remove-orphans || true


  # ── 3. Sync, statistics & multi-Arena tests (full Arena stack) ─────────────
  test-arena:
    name: Sync & multi-Arena tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_USER=user
          DATABASE_PASSWORD=password
          DATABASE_NAME=arena_db
          DATABASE_HOST=wf-db
          DATABASE_PORT=5432
          JWT_SECRET_KEY=ci-test-secret-key
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM_EMAIL=ci@example.com
          SMTP_FROM_NAME=Wrestling Federation
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          FRONTEND_URL=http://localhost:5173
          ARENA_HOST=arena-host
          ARENA_PORT=8080
          ARENA_CLIENT_ID=${{ secrets.ARENA_CLIENT_ID }}
          ARENA_CLIENT_SECRET=${{ secrets.ARENA_CLIENT_SECRET }}
          ARENA_API_KEY=${{ secrets.ARENA_API_KEY }}
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Cache Arena images to avoid ECR Public rate limits on shared GitHub runners
      - name: Cache Arena Docker images
        id: arena-image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/arena-docker-images.tar
          key: arena-docker-images-${{ hashFiles('arena/docker-compose.yaml') }}

      - name: Load Arena images from cache
        if: steps.arena-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/arena-docker-images.tar

      # Start all 3 Arena stacks immediately so they warm up in background
      - name: Start Arena A
        working-directory: arena
        run: docker compose up -d

      - name: Start Arena B
        working-directory: arena
        run: docker compose -p arena-b -f docker-compose-b.yaml up -d

      - name: Start Arena C
        working-directory: arena
        run: docker compose -p arena-c -f docker-compose-c.yaml up -d

      - name: Save Arena images to cache
        if: steps.arena-image-cache.outputs.cache-hit != 'true'
        run: |
          docker save \
            public.ecr.aws/uww/app/arena:latest \
            public.ecr.aws/uww/app/arena-web:latest \
            public.ecr.aws/uww/app/arena-db:latest \
            public.ecr.aws/uww/app/arena-rabbitmq:latest \
            public.ecr.aws/uww/app/arena-mercure:latest \
            public.ecr.aws/uww/app/arena-redis:latest \
            gotenberg/gotenberg:8 \
            -o /tmp/arena-docker-images.tar

      # Build backend from cache while Arenas are warming up
      - name: Build backend image from cache
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: wrestling-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start DB + API
        run: docker compose up -d wf-db wf-api

      - name: Wait for Arena A, B and C to be ready
        run: |
          echo "Waiting for Arena A (port 8080)..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 5; done'
          echo "Arena A is up"
          echo "Waiting for Arena B (port 8081)..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8081/ > /dev/null 2>&1; do sleep 5; done'
          echo "Arena B is up"
          echo "Waiting for Arena C (port 8082)..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8082/ > /dev/null 2>&1; do sleep 5; done'
          echo "Arena C is up"

      - name: Import Arena A seed data
        working-directory: arena
        run: |
          zcat database/seed/arena_data.sql.gz | \
            docker compose exec -T mysql mysql --force -u arena -parena arena
          echo "Seed data imported"

      - name: Load multi-Arena test data
        working-directory: arena
        run: |
          # Arena A: event aaaa... (teams only)
          docker compose exec -T mysql mysql -u arena -parena arena < test_one.sql
          # Arena B: copy users+OAuth from Arena A so auth works, then load event bbbb...
          docker compose exec mysql mysqldump -u arena -parena arena user oauth2_client local_client | \
            docker compose -p arena-b -f docker-compose-b.yaml exec -T mysql mysql -u arena -parena arena
          docker compose -p arena-b -f docker-compose-b.yaml exec -T mysql \
            mysql -u arena -parena arena < test_two.sql
          # Arena C: copy users+OAuth from Arena A, load events cccc...
          docker compose exec mysql mysqldump -u arena -parena arena user oauth2_client local_client | \
            docker compose -p arena-c -f docker-compose-c.yaml exec -T mysql mysql -u arena -parena arena
          docker compose -p arena-c -f docker-compose-c.yaml exec -T mysql \
            mysql -u arena -parena arena < test_three.sql
          echo "Multi-Arena test data loaded"

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          timeout 90 bash -c \
            'until docker compose ps wf-api | grep -q "(healthy)"; do
              docker compose ps wf-api
              sleep 5
            done'

      - name: Run sync & statistics tests
        run: docker compose run --rm wf-tests

      - name: Run multi-Arena sync tests
        run: |
          docker compose run --rm \
            -e ARENA_B_HOST=arena-host \
            -e ARENA_B_PORT=8081 \
            -e ARENA_C_HOST=arena-host \
            -e ARENA_C_PORT=8082 \
            wf-tests \
            sh -c "PYTHONPATH=/app python tests/multi_arena_seed.py && \
                   pytest tests/multi_arena/ -v --tb=short"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs wf-api
          docker compose -f arena/docker-compose.yaml logs nginx php-fpm
          docker compose -p arena-b -f arena/docker-compose-b.yaml logs nginx php-fpm
          docker compose -p arena-c -f arena/docker-compose-c.yaml logs nginx php-fpm

      - name: Stop and clean up
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          docker compose -f arena/docker-compose.yaml down -v --remove-orphans || true
          docker compose -p arena-b -f arena/docker-compose-b.yaml down -v --remove-orphans || true
          docker compose -p arena-c -f arena/docker-compose-c.yaml down -v --remove-orphans || true
