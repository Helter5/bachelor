name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Build backend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-auth:
    name: Auth & access control tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'ENVFILE'
          DATABASE_USER=user
          DATABASE_PASSWORD=password
          DATABASE_NAME=arena_db
          DATABASE_HOST=wf-db
          DATABASE_PORT=5432
          JWT_SECRET_KEY=ci-test-secret-key
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM_EMAIL=ci@example.com
          SMTP_FROM_NAME=Wrestling Federation
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          FRONTEND_URL=http://localhost:5173
          ARENA_HOST=arena-host
          ARENA_PORT=8080
          ARENA_CLIENT_ID=${{ secrets.ARENA_CLIENT_ID }}
          ARENA_CLIENT_SECRET=${{ secrets.ARENA_CLIENT_SECRET }}
          ARENA_API_KEY=${{ secrets.ARENA_API_KEY }}
          ENVFILE
          sed -i 's/^[[:space:]]*//' .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image from cache
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: wrestling-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start DB + API
        run: docker compose up -d wf-db wf-api

      - name: Wait for API to be healthy
        run: |
          timeout 90 bash -c 'until docker compose ps wf-api | grep -q "(healthy)"; do sleep 5; done'

      - name: Run auth & access control tests
        run: |
          docker compose exec -T wf-api python -m pytest \
            tests/test_api_access_control.py \
            tests/test_auth_profile.py \
            -v --tb=short

      - name: Show logs on failure
        if: failure()
        run: docker compose logs wf-api

      - name: Stop and clean up
        if: always()
        run: docker compose down -v --remove-orphans || true

  test-single-sync:
    name: Sync & statistics tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'ENVFILE'
          DATABASE_USER=user
          DATABASE_PASSWORD=password
          DATABASE_NAME=arena_db
          DATABASE_HOST=wf-db
          DATABASE_PORT=5432
          JWT_SECRET_KEY=ci-test-secret-key
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM_EMAIL=ci@example.com
          SMTP_FROM_NAME=Wrestling Federation
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          FRONTEND_URL=http://localhost:5173
          ARENA_HOST=arena-host
          ARENA_PORT=8080
          ARENA_CLIENT_ID=${{ secrets.ARENA_CLIENT_ID }}
          ARENA_CLIENT_SECRET=${{ secrets.ARENA_CLIENT_SECRET }}
          ARENA_API_KEY=${{ secrets.ARENA_API_KEY }}
          ENVFILE
          sed -i 's/^[[:space:]]*//' .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull minimal Arena images (with exponential backoff for ECR rate limits)
        working-directory: arena
        run: |
          set +e
          for attempt in {1..5}; do
            echo "[$(date)] Pull attempt $attempt/5..."
            if docker compose -f docker-compose.sync.yaml pull; then
              echo "[$(date)] Pull successful"
              set -e
              exit 0
            fi
            if [ $attempt -lt 5 ]; then
              wait_time=$((2 ** attempt))s
              echo "[$(date)] ECR rate limit detected, waiting $wait_time before retry..."
              sleep $wait_time
            fi
          done
          echo "[$(date)] ERROR: Failed to pull images after 5 attempts"
          echo "Continuing with cached images if available..."
          set -e

      - name: Start minimal Arena stack
        working-directory: arena
        run: docker compose -f docker-compose.sync.yaml up -d

      - name: Build backend image from cache
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: wrestling-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start DB + API
        run: docker compose up -d wf-db wf-api

      - name: Wait for Arena to be ready
        run: |
          timeout 300 bash -c 'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 5; done' || {
            echo "Arena readiness timed out. Dumping minimal stack status..."
            docker compose -f arena/docker-compose.sync.yaml ps
            docker compose -f arena/docker-compose.sync.yaml logs --tail=200 nginx php-fpm mysql
            exit 1
          }

      - name: Import Arena base seed
        working-directory: arena
        run: |
          zcat database/seed/arena_data.sql.gz | docker compose -f docker-compose.sync.yaml exec -T mysql mysql --force -u arena -parena arena

      - name: Load single-sync test data
        working-directory: arena
        run: docker compose -f docker-compose.sync.yaml exec -T mysql mysql -u arena -parena arena < test_one.sql

      - name: Wait for API to be healthy
        run: |
          timeout 90 bash -c 'until docker compose ps wf-api | grep -q "(healthy)"; do sleep 5; done'

      - name: Run sync & statistics tests
        run: docker compose run --rm wf-tests

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs wf-api
          docker compose -f arena/docker-compose.sync.yaml logs nginx php-fpm mysql

      - name: Stop and clean up
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          docker compose -f arena/docker-compose.sync.yaml down -v --remove-orphans || true

  test-multi-sync:
    name: Multi-Arena sync tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'ENVFILE'
          DATABASE_USER=user
          DATABASE_PASSWORD=password
          DATABASE_NAME=arena_db
          DATABASE_HOST=wf-db
          DATABASE_PORT=5432
          JWT_SECRET_KEY=ci-test-secret-key
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM_EMAIL=ci@example.com
          SMTP_FROM_NAME=Wrestling Federation
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          FRONTEND_URL=http://localhost:5173
          ARENA_HOST=arena-host
          ARENA_PORT=8080
          ARENA_CLIENT_ID=${{ secrets.ARENA_CLIENT_ID }}
          ARENA_CLIENT_SECRET=${{ secrets.ARENA_CLIENT_SECRET }}
          ARENA_API_KEY=${{ secrets.ARENA_API_KEY }}
          ENVFILE
          sed -i 's/^[[:space:]]*//' .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Arena A/B/C images (with exponential backoff for ECR rate limits)
        working-directory: arena
        run: |
          set +e
          pull_stack() {
            local stack=$1
            local project=$2
            local attempt
            for attempt in {1..5}; do
              echo "[$(date)] Pull attempt $attempt/5 for $stack (project: $project)..."
              if [ -z "$project" ]; then
                docker compose -f "$stack" -f docker-compose.ci.yaml pull
              else
                docker compose -p "$project" -f "$stack" -f docker-compose.ci.yaml pull
              fi
              if [ $? -eq 0 ]; then
                echo "[$(date)] Pull successful for $stack"
                return 0
              fi
              if [ $attempt -lt 5 ]; then
                wait_time=$((2 ** attempt))s
                echo "[$(date)] ECR rate limit detected, waiting $wait_time before retry..."
                sleep $wait_time
              fi
            done
            echo "[$(date)] WARNING: Failed to pull $stack after 5 attempts, continuing with cached images..."
            return 0
          }
          
          pull_stack "docker-compose.yaml" ""
          pull_stack "docker-compose-b.yaml" "arena-b"
          pull_stack "docker-compose-c.yaml" "arena-c"
          set -e

      - name: Start Arena A
        working-directory: arena
        run: docker compose -f docker-compose.yaml -f docker-compose.ci.yaml up -d

      - name: Start Arena B
        working-directory: arena
        run: docker compose -p arena-b -f docker-compose-b.yaml -f docker-compose.ci.yaml up -d

      - name: Start Arena C
        working-directory: arena
        run: docker compose -p arena-c -f docker-compose-c.yaml -f docker-compose.ci.yaml up -d

      - name: Build backend image from cache
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: wrestling-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start DB + API
        run: docker compose up -d wf-db wf-api

      - name: Wait for Arena A/B/C to be ready
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 5; done'
          timeout 120 bash -c 'until curl -sf http://localhost:8081/ > /dev/null 2>&1; do sleep 5; done'
          timeout 120 bash -c 'until curl -sf http://localhost:8082/ > /dev/null 2>&1; do sleep 5; done'

      - name: Import Arena A base seed
        working-directory: arena
        run: |
          zcat database/seed/arena_data.sql.gz | docker compose exec -T mysql mysql --force -u arena -parena arena

      - name: Load multi-Arena test data
        working-directory: arena
        run: |
          docker compose exec -T mysql mysql -u arena -parena arena < test_one.sql
          docker compose exec mysql mysqldump -u arena -parena arena user oauth2_client local_client | docker compose -p arena-b -f docker-compose-b.yaml exec -T mysql mysql -u arena -parena arena
          docker compose -p arena-b -f docker-compose-b.yaml exec -T mysql mysql -u arena -parena arena < test_two.sql
          docker compose exec mysql mysqldump -u arena -parena arena user oauth2_client local_client | docker compose -p arena-c -f docker-compose-c.yaml exec -T mysql mysql -u arena -parena arena
          docker compose -p arena-c -f docker-compose-c.yaml exec -T mysql mysql -u arena -parena arena < test_three.sql

      - name: Wait for API to be healthy
        run: |
          timeout 90 bash -c 'until docker compose ps wf-api | grep -q "(healthy)"; do sleep 5; done'

      - name: Run multi-Arena sync tests
        run: |
          docker compose run --rm \
            -e ARENA_B_HOST=arena-host \
            -e ARENA_B_PORT=8081 \
            -e ARENA_C_HOST=arena-host \
            -e ARENA_C_PORT=8082 \
            wf-tests \
            sh -c "PYTHONPATH=/app python tests/multi_arena_seed.py && pytest tests/multi_arena/ -v --tb=short"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs wf-api
          docker compose -f arena/docker-compose.yaml logs nginx php-fpm
          docker compose -p arena-b -f arena/docker-compose-b.yaml logs nginx php-fpm
          docker compose -p arena-c -f arena/docker-compose-c.yaml logs nginx php-fpm

      - name: Stop and clean up
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          docker compose -f arena/docker-compose.yaml down -v --remove-orphans || true
          docker compose -p arena-b -f arena/docker-compose-b.yaml down -v --remove-orphans || true
          docker compose -p arena-c -f arena/docker-compose-c.yaml down -v --remove-orphans || true
