services:
  wf-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8088:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  wf-pgadmin:
    profiles:
      - donotstart
